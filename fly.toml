app = "tilestorm-ws"
primary_region = "lhr"  # London — closest to UK users

[build]
  [build.args]

[env]
  PORT = "8765"

[[services]]
  internal_port = 8765
  protocol = "tcp"

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80

  # WebSocket-specific
  [[services.tcp_checks]]
    grace_period = "5s"
    interval = "30s"
    restart_limit = 0
    timeout = "5s"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
